<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Portfolio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   ATLAS PORTFOLIO MANAGER — Master Stylesheet
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --bg:          #0b0d0f;
  --surface:     #141618;
  --surface2:    #1b1e23;
  --surface3:    #22262d;
  --border:      #2a2f38;
  --border2:     #363d49;
  --accent:      #E8621A;
  --accent-glow: rgba(232,98,26,.15);
  --accent-mid:  #1aA87a;
  --accent-warn: #E8A21A;
  --text1:       #eef0f4;
  --text2:       #9aa3b0;
  --text3:       #55606e;
  --radius:      14px;
  --radius-sm:   9px;
  --radius-xs:   5px;
  --t:           .17s cubic-bezier(.4,0,.2,1);
}
body.light-mode {
  --bg:      #f0f2f5;
  --surface: #ffffff;
  --surface2:#e8eaee;
  --surface3:#dde0e6;
  --border:  #d0d4dc;
  --border2: #bcc2cc;
  --text1:   #141820;
  --text2:   #424a58;
  --text3:   #7a8494;
}
body.light-mode header { background: rgba(240,242,245,.96); }

/* ── RESET ───────────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text1);
  font-family: 'Montserrat', sans-serif; font-size: 13px;
  min-height: 100vh; line-height: 1.5;
  transition: background var(--t), color var(--t);
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── HEADER ──────────────────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,13,15,.92); backdrop-filter: blur(24px) saturate(1.6);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.logo-mark {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-weight: 800; font-size: 15px; color: #fff;
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.logo-text { font-size: 13px; font-weight: 700; letter-spacing: -.02em; }
.logo-text em { font-style: normal; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 6px; }
.crumb { font-size: 11px; color: var(--text3); font-weight: 500; margin-right: 2px; }
#backBtn, .hdr-btn, #pdfBtn {
  cursor: pointer; font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 600; padding: 6px 13px; border-radius: 99px;
  border: 1px solid var(--border2); background: var(--surface2); color: var(--text2);
  transition: all var(--t); display: flex; align-items: center; gap: 5px;
}
#backBtn:hover, .hdr-btn:hover, #pdfBtn:hover {
  color: var(--text1); border-color: var(--accent); background: var(--surface3);
}
#backBtn { display: none; }
#backBtn.visible { display: flex; }
#exportBtn {
  cursor: pointer; font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 700; padding: 7px 14px; border-radius: 99px;
  border: none; background: var(--accent); color: #fff;
  display: none; align-items: center; gap: 5px; transition: opacity var(--t);
}
#exportBtn:hover { opacity: .85; }
#pdfBtn { display: none; }

/* ── PAGES ───────────────────────────────────────────────────────────────── */
.page { display: none; }
.page.active { display: block; animation: pgIn .22s cubic-bezier(.4,0,.2,1); }
@keyframes pgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ══════════════════════════════════════════════════════════════════════════
   DASHBOARD
   ══════════════════════════════════════════════════════════════════════════ */
#pg-dashboard { padding: 40px 32px; max-width: 1240px; margin: 0 auto; }
.dash-hero { margin-bottom: 32px; }
.dash-hero h1 { font-size: 30px; font-weight: 800; letter-spacing: -.04em; margin-bottom: 4px; }
.dash-hero h1 em { font-style: normal; color: var(--accent); }
.dash-hero p { color: var(--text3); font-size: 11px; font-weight: 500; }

.dash-kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap: 12px; margin-bottom: 28px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px 18px;
  position: relative; overflow: hidden;
  transition: border-color var(--t), transform var(--t);
}
.kpi-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity:0; transition: opacity var(--t);
}
.kpi-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-card:hover::after { opacity: 1; }
.kpi-card .kl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: 10px; }
.kpi-card .kv { font-size: 24px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.kpi-card .ks { font-size: 10px; color: var(--text3); margin-top: 5px; font-weight: 500; }

/* Filter pills */
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; align-items: center; }
.filter-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-right: 4px; }
.fpill {
  font-size: 10px; font-weight: 600; padding: 5px 13px; border-radius: 99px;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--text3); transition: all var(--t); letter-spacing: .02em;
}
.fpill:hover { border-color: var(--border2); color: var(--text2); background: var(--surface2); }
.fpill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* Alert badges */
.alert-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; padding: 3px 8px;
  border-radius: 4px; letter-spacing: .04em; margin-bottom: 10px;
}
.alert-badge.crit { background: rgba(248,113,113,.1); color: #f87171; border: 1px solid rgba(248,113,113,.2); }
.alert-badge.warn { background: rgba(232,162,26,.1); color: var(--accent-warn); border: 1px solid rgba(232,162,26,.2); }

.dash-section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); margin-bottom: 16px; }

/* ── PROJECT OVERVIEW CARDS ──────────────────────────────────────────────── */
.poc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 16px; margin-bottom: 40px; }
.poc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color var(--t), box-shadow var(--t), transform var(--t);
}
.poc-card:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(0,0,0,.3); transform: translateY(-3px); }
.poc-card.alert-crit { border-top: 3px solid #f87171; }
.poc-card.alert-warn { border-top: 3px solid var(--accent-warn); }
.poc-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 16px; gap: 12px; }
.poc-left { flex: 1; min-width: 0; }
.poc-right { text-align: right; flex-shrink: 0; }
.poc-location { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); margin-bottom: 5px; }
.poc-name { font-size: 19px; font-weight: 800; letter-spacing: -.03em; line-height: 1.15; color: var(--text1); }
.poc-mwp { font-size: 17px; font-weight: 800; color: var(--accent); letter-spacing: -.03em; line-height: 1.15; }
.poc-mwp-u { font-size: 12px; font-weight: 600; color: var(--text3); }
.poc-spes { font-size: 10px; color: var(--text3); font-weight: 600; margin-top: 3px; }
.poc-divider { height: 1px; background: var(--border); margin: 0 20px; }
.poc-list { padding: 8px 20px 4px; flex: 1; }
.poc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.poc-row:last-child { border-bottom: none; }
.poc-icon { font-size: 13px; flex-shrink: 0; width: 20px; text-align: center; }
.poc-row-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.poc-cname { font-size: 12px; font-weight: 600; color: var(--text1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.poc-cname.poc-empty { color: var(--text3); font-style: italic; font-weight: 400; }
.poc-ctor { font-size: 10px; color: var(--text3); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.poc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.poc-cta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; font-size: 11px; font-weight: 700; color: var(--text3);
  border-top: 1px solid var(--border); margin-top: auto;
  transition: color var(--t);
}
.poc-card:hover .poc-cta { color: var(--accent); }
.poc-arrow { font-size: 14px; display: inline-block; transition: transform var(--t); }
.poc-card:hover .poc-arrow { transform: translateX(4px); }
.proposta-pill {
  font-size: 9px; font-weight: 700;
  background: rgba(251,191,36,.1); color: #fbbf24;
  border: 1px solid rgba(251,191,36,.2);
  padding: 1px 6px; border-radius: 3px; letter-spacing: .04em; margin-left: 5px;
}

/* ══════════════════════════════════════════════════════════════════════════
   PROJECT PAGE
   ══════════════════════════════════════════════════════════════════════════ */
#pg-project { max-width: 1080px; margin: 0 auto; padding: 36px 32px; }
.proj-header { margin-bottom: 0; padding-bottom: 22px; }
.proj-loc { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .16em; color: var(--accent); margin-bottom: 6px; }
.proj-title { font-size: 30px; font-weight: 800; letter-spacing: -.04em; margin-bottom: 3px; line-height: 1.1; }
.proj-eff { font-size: 11px; color: var(--text3); font-weight: 500; }
.spe-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 0; }
.spe-chip {
  font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-xs);
  background: var(--surface2); border: 1px solid var(--border); color: var(--text3);
  cursor: default; transition: all var(--t); letter-spacing: .03em;
}
.spe-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* Tab nav */
.pg-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin: 22px 0 28px; overflow-x: auto; scrollbar-width: none;
}
.pg-tabs::-webkit-scrollbar { display: none; }
.pg-tab {
  display: flex; align-items: center; gap: 7px; padding: 11px 20px;
  border: none; background: transparent; color: var(--text3);
  font-size: 12px; font-weight: 600; font-family: 'Montserrat', sans-serif;
  cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color var(--t), border-color var(--t), background var(--t);
}
.pg-tab:hover:not(.active) { color: var(--text2); background: var(--surface2); }
.pg-tab.active { color: var(--text1); border-bottom-color: var(--accent); }
.pg-tab-content { min-height: 380px; }

/* Contract type selector */
.contract-selector {
  display: flex; gap: 6px; margin-bottom: 22px;
  overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin;
}
.contract-selector::-webkit-scrollbar { height: 3px; }
.contract-selector::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
.cs-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text3);
  font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
  transition: all var(--t); font-family: 'Montserrat', sans-serif;
}
.cs-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); background: var(--surface3); }
.cs-btn.active { background: var(--surface); color: var(--text1); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.cs-btn.cs-empty { opacity: .4; }
.cs-btn.cs-empty.active { opacity: 1; }
.cs-dot { width: 6px; height: 6px; border-radius: 99px; flex-shrink: 0; }

/* Empty contract placeholder */
.empty-contract-panel {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 24px; text-align: center;
  background: var(--surface2); border: 1px dashed var(--border2);
  border-radius: var(--radius); min-height: 260px; gap: 10px;
}
.ec-icon { font-size: 40px; opacity: .18; }
.ec-title { font-size: 14px; font-weight: 700; color: var(--text2); }
.ec-sub { font-size: 11px; color: var(--text3); max-width: 280px; line-height: 1.6; }

/* Contract panel */
.contract-panel { display: none; }
.contract-panel.active { display: block; animation: pgIn .18s cubic-bezier(.4,0,.2,1); }
.proposta-banner { background: rgba(251,191,36,.06); border: 1px solid rgba(251,191,36,.18); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 18px; font-size: 11px; color: #fbbf24; font-weight: 500; }
.proposta-banner strong { display: block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }

/* Summary cards */
.sum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 10px; margin-bottom: 22px; }
.sum-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 15px; }
.sum-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 5px; }
.sum-val { font-size: 12px; line-height: 1.5; color: var(--text1); font-weight: 500; }

/* Highlights */
.highlights { background: rgba(232,98,26,.04); border: 1px solid rgba(232,98,26,.14); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 22px; }
.hl-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 9px; }
.hl-item { font-size: 12px; color: var(--text1); padding: 4px 0; border-bottom: 1px solid rgba(232,98,26,.07); font-weight: 500; }
.hl-item:last-child { border-bottom: none; }
.hl-item::before { content: '→ '; color: var(--accent); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 22px; flex-wrap: wrap; }
.tab-btn {
  padding: 9px 15px; cursor: pointer; font-size: 10px; font-weight: 700;
  color: var(--text3); border-bottom: 2px solid transparent;
  transition: all var(--t); white-space: nowrap;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'Montserrat', sans-serif; letter-spacing: .06em; text-transform: uppercase;
}
.tab-btn:hover:not(.active) { color: var(--text2); background: var(--surface2); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: pgIn .15s cubic-bezier(.4,0,.2,1); }

/* Field rows */
.field-row { display: grid; grid-template-columns: 175px 1fr; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: start; }
.field-row:last-child { border-bottom: none; }
.field-key { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--text3); padding-top: 2px; }
.field-val { font-size: 12px; line-height: 1.65; color: var(--text1); font-weight: 500; white-space: pre-wrap; }

/* Risk cards */
.item-cards { display: grid; gap: 9px; }
.item-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; border-left: 3px solid var(--border); transition: border-color var(--t); }
.item-card:hover { border-left-color: var(--border2); }
.item-card.r-alto { border-left-color: #f87171; }
.item-card.r-medio { border-left-color: var(--accent-warn); }
.item-card.r-baixo { border-left-color: var(--accent-mid); }
.ic-title { font-weight: 700; font-size: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.ic-desc { font-size: 11px; color: var(--text2); line-height: 1.65; font-weight: 500; }
.rbadge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .06em; }
.rbadge.r-alto { background: rgba(248,113,113,.1); color: #f87171; }
.rbadge.r-medio { background: rgba(232,162,26,.1); color: var(--accent-warn); }
.rbadge.r-baixo { background: rgba(26,168,122,.1); color: var(--accent-mid); }

/* Prices tables */
.prices-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.prices-table th { text-align: left; padding: 8px 12px; font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; border-bottom: 1px solid var(--border); }
.prices-table td { padding: 8px 12px; border-bottom: 1px solid rgba(42,47,56,.6); vertical-align: top; font-weight: 500; }
.prices-table tr:hover td { background: var(--surface2); }
.prices-table .sec-row td { color: var(--accent); font-size: 9px; font-weight: 700; background: rgba(232,98,26,.04); padding: 6px 12px; letter-spacing: .08em; text-transform: uppercase; }
.spe-prices-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 14px; }
.spe-prices-table th { background: rgba(232,98,26,.08); padding: 7px 12px; font-size: 9px; font-weight: 700; color: var(--accent); text-transform: uppercase; text-align: left; }
.spe-prices-table td { padding: 8px 12px; border-top: 1px solid var(--border); font-weight: 500; }
.spe-prices-table .diff { color: var(--accent-warn); font-weight: 700; }

/* Textarea */
.personnel-ta {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text1);
  font-family: 'Montserrat', sans-serif; font-size: 12px; padding: 13px;
  resize: vertical; min-height: 140px; line-height: 1.75; font-weight: 500;
  transition: border-color var(--t), box-shadow var(--t);
}
.personnel-ta:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.personnel-hint { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; }

/* Dates */
.dates-grid { display: grid; gap: 9px; }
.date-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 15px; display: grid; grid-template-columns: 115px 1fr; gap: 14px; transition: border-color var(--t); }
.date-item:hover { border-color: var(--border2); }
.date-d { font-size: 10px; font-weight: 700; color: var(--accent); padding-top: 1px; }
.date-t { font-weight: 700; font-size: 12px; margin-bottom: 3px; }
.date-desc { font-size: 11px; color: var(--text2); font-weight: 500; line-height: 1.5; }

/* Misc */
.empty { color: var(--text3); font-size: 12px; font-weight: 500; padding: 16px 0; }
.sec-heading { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.gen-tag { font-size: 10px; color: var(--border2); text-align: center; padding: 40px 0 16px; font-weight: 500; letter-spacing: .06em; }

/* Form inputs */
#pg-project input, #pg-project select, #pg-project textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text1);
  font-family: 'Montserrat', sans-serif;
  transition: border-color var(--t), box-shadow var(--t);
}
#pg-project input:focus, #pg-project select:focus, #pg-project textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
#pg-project input::placeholder, #pg-project textarea::placeholder { color: var(--text3); }

/* ══════════════════════════════════════════════════════════════════════════
   PLANT VIEW
   ══════════════════════════════════════════════════════════════════════════ */
.plant-view { margin-top: 4px; }
.pv-hero { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
.pv-kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px 16px; transition: border-color var(--t), transform var(--t); position: relative; overflow: hidden; }
.pv-kpi::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
.pv-kpi:hover { border-color: var(--border2); transform: translateY(-1px); }
.pv-kpi-v { font-size: 21px; font-weight: 800; color: var(--text1); letter-spacing: -.03em; line-height: 1.1; margin-bottom: 6px; }
.pv-kpi-l { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); }
.pv-hero-empty { font-size: 16px; color: var(--text3); font-style: normal; }
.pv-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 28px; align-items: start; margin-bottom: 8px; }
.pv-section { margin-bottom: 22px; }
.pv-section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); padding-bottom: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
.pv-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.pv-row:last-child { border-bottom: none; }
.pv-key { font-size: 10px; font-weight: 600; color: var(--text3); flex-shrink: 0; }
.pv-val { font-weight: 500; color: var(--text1); text-align: right; line-height: 1.4; }
.pv-empty { font-style: italic; color: var(--text3); font-weight: 400; }
.pv-table-wrap { overflow-x: auto; }
.pv-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.pv-table thead tr { border-bottom: 1px solid var(--border); }
.pv-table th { text-align: left; padding: 7px 10px; font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
.pv-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; font-weight: 500; }
.pv-table tbody tr:last-child td { border-bottom: none; }
.pv-table tbody tr:hover td { background: var(--surface2); }
.pv-spe-num { font-weight: 800; color: var(--accent); width: 46px; }
.pv-mono { font-family: 'Menlo','Consolas',monospace; font-size: 10px; color: var(--text2); }
.pv-parte { font-size: 10px; color: var(--text3); }
.pv-coord-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 15px; }
.pv-coord-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.pv-coord-row:last-of-type { border-bottom: none; }
.pv-coord-ref { font-size: 10px; color: var(--text3); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-style: italic; }
.pv-maps-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 12px; font-size: 11px; font-weight: 700; color: var(--accent); text-decoration: none; transition: opacity var(--t); }
.pv-maps-btn:hover { opacity: .7; }
.pv-empty-block { background: var(--surface2); border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 26px 16px; text-align: center; }
.pv-empty-icon { font-size: 22px; opacity: .2; margin-bottom: 8px; }
.pv-empty-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.pv-empty-sub { font-size: 11px; color: var(--text3); line-height: 1.5; }
.pv-notes-text { font-size: 11px; color: var(--text2); line-height: 1.6; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }

/* ══════════════════════════════════════════════════════════════════════════
   BUSINESS VIEW
   ══════════════════════════════════════════════════════════════════════════ */
.bs-wrap { display: flex; flex-direction: column; gap: 28px; margin-top: 4px; }
.bs-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.bs-card { padding: 20px 22px; background: var(--surface); border-right: 1px solid var(--border); }
.bs-card:last-child { border-right: none; }
.bs-card-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: 8px; }
.bs-card-value { font-size: 21px; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 5px; font-variant-numeric: tabular-nums; color: var(--text1); }
.bs-card-sub { font-size: 10px; color: var(--text3); font-weight: 500; }
.bs-rev  .bs-card-value { color: var(--accent-mid); }
.bs-opx  .bs-card-value { color: #f87171; }
.bs-pos  .bs-card-value { color: var(--accent-mid); }
.bs-neg  .bs-card-value { color: #f87171; }
.bs-empty-val { font-size: 17px; color: var(--text3); font-weight: 400; }
.bs-green  { color: var(--accent-mid) !important; }
.bs-accent { color: var(--accent) !important; }
.bs-na     { color: var(--text3) !important; font-style: italic; font-weight: 400 !important; font-size: 11px !important; }
.bs-section { display: flex; flex-direction: column; gap: 10px; }
.bs-section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.bs-placeholder { background: var(--surface2); border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 22px 16px; text-align: center; font-size: 12px; color: var(--text3); }
.bs-ppa { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 15px 17px; transition: border-color var(--t); }
.bs-ppa:hover { border-color: var(--border2); }
.bs-ppa-name { font-size: 13px; font-weight: 700; color: var(--text1); margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.bs-ppa-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.bs-ppa-row:last-child { border-bottom: none; }
.bs-ppa-k { font-size: 10px; font-weight: 600; color: var(--text3); }
.bs-ppa-v { font-weight: 600; color: var(--text1); }
.bs-form { border: 1px dashed var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
.bs-form-sum { padding: 11px 16px; font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; list-style: none; transition: background var(--t); }
.bs-form-sum::-webkit-details-marker { display: none; }
.bs-form-sum:hover { background: var(--surface2); }
.bs-form-body { padding: 16px; border-top: 1px solid var(--border); background: var(--surface); }
.bs-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.bs-ff { display: flex; flex-direction: column; gap: 5px; }
.bs-ff label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); }
.bs-ff input { padding: 8px 10px; font-size: 12px; width: 100%; }
.bs-ff-wide { grid-column: span 2; }
.bs-btn { background: var(--accent-mid); color: #fff; border: none; padding: 9px 22px; border-radius: 99px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: opacity var(--t); }
.bs-btn:hover { opacity: .85; }
.bs-opex-row { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.bs-opex-info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.bs-opex-name { font-size: 12px; font-weight: 500; color: var(--text1); }
.bs-opex-src  { font-size: 10px; color: var(--text3); }
.bs-opex-bar  { width: 80px; height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
.bs-opex-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.bs-opex-val  { font-size: 12px; font-weight: 700; color: var(--text1); min-width: 120px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.bs-opex-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; }
.bs-opex-total .bs-opex-name { font-weight: 700; }

/* ══════════════════════════════════════════════════════════════════════════
   GENERATION WALK
   ══════════════════════════════════════════════════════════════════════════ */
.gw-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-top: 4px; }
.gw-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.gw-title { font-size: 13px; font-weight: 700; color: var(--text1); }
.gw-period { font-size: 9px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 2px 8px; border-radius: 99px; margin-left: 8px; text-transform: uppercase; letter-spacing: .06em; }
.gw-unit { font-size: 10px; color: var(--text3); font-weight: 500; }
.gw-chart-scroll { background: #000; padding: 16px 0 0; display: flex; justify-content: center; overflow-x: auto; scrollbar-width: thin; }
.gw-chart-scroll::-webkit-scrollbar { height: 4px; }
.gw-chart-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
.gw-chart-center { display: flex; justify-content: center; padding: 0 16px; }
.gw-legend { display: flex; gap: 20px; flex-wrap: wrap; padding: 12px 18px; border-top: 1px solid var(--border); background: var(--surface2); }
.gw-leg-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text3); font-weight: 500; }
.gw-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════════════════════
   NOTICES
   ══════════════════════════════════════════════════════════════════════════ */
.notice-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; }
.notice-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px; }
.notice-id { font-size: 10px; font-weight: 700; font-family: monospace; margin-bottom: 3px; }
.notice-status-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }

/* ══════════════════════════════════════════════════════════════════════════
   PERFORMANCE VIEW
   ══════════════════════════════════════════════════════════════════════════ */
.perf-upload-hint { background: var(--surface2); border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 22px 16px; text-align: center; margin-top: 20px; }
.perf-upload-icon { font-size: 22px; margin-bottom: 8px; opacity: .3; }
.perf-upload-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.perf-upload-sub { font-size: 11px; color: var(--text3); }
.bv-form-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 12px; }

/* ══════════════════════════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  .pv-grid { grid-template-columns: 1fr; }
  .pv-hero { grid-template-columns: repeat(2,1fr); }
  .bs-summary { grid-template-columns: 1fr; }
  .bs-card { border-right: none; border-bottom: 1px solid var(--border); }
  .bs-card:last-child { border-bottom: none; }
  .bs-form-grid { grid-template-columns: 1fr; }
  .bs-ff-wide { grid-column: span 1; }
  .bs-opex-bar { display: none; }
}
@media (max-width: 680px) {
  header { padding: 0 16px; }
  #pg-dashboard, #pg-project { padding: 22px 16px; }
  .field-row { grid-template-columns: 1fr; }
  .sum-grid { grid-template-columns: 1fr 1fr; }
  .dash-kpis { grid-template-columns: repeat(2,1fr); }
  .proj-title { font-size: 24px; }
  .crumb { display: none; }
  .pg-tab span { display: none; }
}

/* ══════════════════════════════════════════════════════════════════════════
   PRINT
   ══════════════════════════════════════════════════════════════════════════ */
@media print {
  header, .pg-tabs, .contract-selector, .tabs, .filter-bar,
  #backBtn, #exportBtn, #pdfBtn, .hdr-btn { display: none !important; }
  .contract-panel, .tab-pane { display: block !important; }
  body { background: #fff; color: #000; }
  .sum-card, .item-card, .date-item { break-inside: avoid; }
}


/* ── BUSINESS — KPI pill strip ──────────────────────────────────────────── */
.bv-kpi-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.bv-kpi-pill {
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  flex: 1;
  min-width: 120px;
}
.bv-kpi-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text3);
}
.bv-kpi-val {
  font-size: 13px; font-weight: 700; color: var(--text1);
}

@media (max-width: 680px) {
  .pv-top-grid { grid-template-columns: 1fr; }
  .pv-env-grid { grid-template-columns: 1fr 1fr; }
}

/* ── PLANT VIEW — two-col rows ──────────────────────────────────────────── */
.pv-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-bottom: 4px;
}

/* ── PLANT VIEW — env card grid ─────────────────────────────────────────── */
.pv-section-env { margin-top: 4px; }
.pv-env-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.pv-env-item {
  display: flex; flex-direction: column; gap: 3px;
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.pv-env-key {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text3);
}
.pv-env-val { font-size: 12px; font-weight: 600; color: var(--text1); }

/* ── BUSINESS — KPI pill strip ──────────────────────────────────────────── */
.bv-kpi-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.bv-kpi-pill {
  display: flex; flex-direction: column; gap: 3px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  flex: 1; min-width: 120px;
}
.bv-kpi-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text3);
}
.bv-kpi-val { font-size: 13px; font-weight: 700; color: var(--text1); }

@media (max-width: 700px) {
  .pv-two-col { grid-template-columns: 1fr; }
  .pv-env-grid { grid-template-columns: 1fr 1fr; }
}

/* ── CONTRACT HIGHLIGHT — single row ───────────────────────────────────── */
.hl-single {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  font-size: 12px;
}
.hl-single-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--accent);
  flex-shrink: 0;
}
.hl-single-text {
  color: var(--text1); font-weight: 500; line-height: 1.5;
}

/* ── CONTRACT PANEL — summary info lines ───────────────────────────────── */
.cp-info {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 16px;
  margin-bottom: 20px;
}
.cp-info .pv-row { padding: 9px 0; }
.cp-info .pv-row:last-child { border-bottom: none; }
.cp-info .pv-key { min-width: 100px; }

/* ── CONTRACT TIMELINE ───────────────────────────────────────────────────── */
.tl-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px 12px;
  margin-bottom: 20px;
}
.tl-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.tl-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .12em; color: var(--text3);
}
.tl-active  { font-size: 11px; font-weight: 600; color: var(--accent-mid); }
.tl-warranty{ font-size: 11px; font-weight: 600; color: #f59e0b; }
.tl-expired { font-size: 11px; font-weight: 600; color: #ef4444; }

/* ── PERFORMANCE VIEW ───────────────────────────────────────────────────── */
.perf-kpi-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.perf-kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
}
.perf-kpi-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .12em; color: var(--text3); margin-bottom: 8px;
}
.perf-kpi-val {
  font-size: 28px; font-weight: 800; letter-spacing: -.03em;
  line-height: 1; margin-bottom: 5px; font-variant-numeric: tabular-nums;
}
.perf-kpi-sub { font-size: 10px; color: var(--text3); font-weight: 500; }

/* Month block */
.perf-month-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 16px;
}
.perf-month-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.perf-month-title {
  font-size: 12px; font-weight: 700; color: var(--text1);
}
.perf-month-meta {
  font-size: 9px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em;
}

/* Week rows */
.perf-week-header,
.perf-week-row,
.perf-month-total {
  display: grid;
  grid-template-columns: 120px 1fr 80px 110px;
  gap: 12px;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.perf-week-header {
  background: var(--surface2);
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .09em; color: var(--text3);
}
.perf-week-row:last-of-type { border-bottom: none; }
.perf-week-row:hover { background: var(--surface2); }

.perf-week-label {
  display: flex; flex-direction: column; gap: 2px;
}
.perf-week-name {
  font-size: 12px; font-weight: 600; color: var(--text1);
}
.perf-week-period {
  font-size: 10px; color: var(--text3);
}
.perf-week-bar-wrap {
  height: 6px; background: var(--surface3);
  border-radius: 99px; overflow: hidden;
}
.perf-week-bar {
  height: 100%; border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.perf-week-topr {
  font-size: 12px; font-weight: 700;
  text-align: right; font-variant-numeric: tabular-nums;
}
.perf-week-curt {
  font-size: 11px; color: var(--text2); font-weight: 500;
  text-align: right; font-variant-numeric: tabular-nums;
}

/* Total row */
.perf-month-total {
  background: var(--surface2);
  border-top: 2px solid var(--border);
  border-bottom: none;
  padding: 12px 16px;
}
.perf-month-total .perf-week-name {
  font-weight: 700; font-size: 11px; color: var(--text2);
}

@media (max-width: 680px) {
  .perf-kpi-row { grid-template-columns: 1fr; }
  .perf-week-header,
  .perf-week-row,
  .perf-month-total { grid-template-columns: 100px 1fr 70px 90px; gap: 8px; }
  .perf-week-bar-wrap { display: none; }
}

/* ── PERFORMANCE — collapsible months ──────────────────────────────────── */
.perf-month-block {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--surface);
}
.perf-month-block summary { list-style: none; }
.perf-month-block summary::-webkit-details-marker { display: none; }

.perf-month-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; cursor: pointer;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  user-select: none;
  transition: background var(--t);
}
.perf-month-header:hover { background: var(--surface3); }
details[open] .perf-month-header { border-bottom: 1px solid var(--border); }

/* Chevron indicator */
.perf-month-header::after {
  content: '›';
  font-size: 16px; color: var(--text3);
  transform: rotate(0deg);
  transition: transform var(--t);
  margin-left: 8px;
}
details[open] > .perf-month-header::after { transform: rotate(90deg); }

.perf-month-title {
  font-size: 13px; font-weight: 700; color: var(--text1);
}
.perf-mo-badges { display: flex; gap: 6px; align-items: center; }
.perf-mo-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 99px; letter-spacing: .02em;
}
.perf-mo-ok    { background: rgba(26,168,122,.12); color: var(--accent-mid); }
.perf-mo-fail  { background: rgba(239,68,68,.12);  color: #ef4444; }
.perf-mo-curt  { background: var(--surface3); color: var(--text2); }
.perf-mo-empty { background: var(--surface3); color: var(--text3); font-style: italic; }

.perf-empty-month {
  padding: 20px 16px;
  font-size: 11px; color: var(--text3); text-align: center; font-style: italic;
}

/* ── PERFORMANCE ACCORDION ───────────────────────────────────────────────── */
.perf-accordion {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
}

.perf-acc-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color var(--t);
}
.perf-acc-item.open { border-color: var(--border2); }

.perf-acc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
  transition: background var(--t);
}
.perf-acc-header:hover { background: var(--surface2); }

.perf-acc-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text1);
  flex: 1;
}

.perf-acc-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 99px;
  letter-spacing: .02em;
  font-variant-numeric: tabular-nums;
}
.perf-acc-empty {
  background: var(--surface3);
  color: var(--text3);
  font-style: italic;
  font-weight: 400;
}

.perf-acc-arrow {
  font-size: 11px;
  color: var(--text3);
  transition: transform var(--t);
  flex-shrink: 0;
}

/* Body — collapsed by default */
.perf-acc-body {
  display: none;
  border-top: 1px solid var(--border);
}
.perf-acc-item.open .perf-acc-body {
  display: block;
  animation: pgIn .15s cubic-bezier(.4,0,.2,1);
}

/* ── PERFORMANCE TABLE ───────────────────────────────────────────────────── */
.pmt-wrap { margin-bottom: 8px; }

.pmt-section-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .14em; color: var(--text3);
  padding-bottom: 8px; margin-bottom: 0;
  border-bottom: 1px solid var(--border);
}

.pmt-scroll { overflow-x: auto; scrollbar-width: thin; }
.pmt-scroll::-webkit-scrollbar { height: 3px; }
.pmt-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.pmt-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.pmt-table thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.pmt-table th {
  padding: 9px 16px; text-align: center;
  font-size: 10px; font-weight: 700; color: var(--text2);
  white-space: nowrap;
}
.pmt-table th:first-child { text-align: left; }

.pmt-table tbody tr { border-bottom: 1px solid var(--border); }
.pmt-table tbody tr:last-child { border-bottom: none; }
.pmt-table tbody tr:hover td { background: var(--surface2); }

.pmt-label {
  padding: 10px 16px 10px 0;
  font-size: 11px; font-weight: 500; color: var(--text2);
  white-space: nowrap;
}
.pmt-val {
  padding: 10px 16px;
  text-align: center;
  font-size: 12px; font-weight: 700; color: var(--text1);

.pmt-section { margin-bottom: 20px; }

.pmt-sub-label { background: var(--surface2); }
.pmt-sub-cell {

function fmtBRL(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e9) return 'R$ ' + (n/1e9).toFixed(1).replace('.',',') + 'B';
  if (n >= 1e6) return 'R$ ' + (n/1e6).toFixed(1).replace('.',',') + 'M';
  return 'R$ ' + Math.round(n).toLocaleString('pt-BR');
}

function rb(r) {
  var m = {alto:'r-alto', medio:'r-medio', baixo:'r-baixo'};
  var l = {alto:'ALTO', medio:'MÉDIO', baixo:'BAIXO'};
  return r ? '<span class="rbadge ' + (m[r]||'') + '">' + (l[r]||r) + '</span>' : '';
}

function showPage(id) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── LIFE BAR ──────────────────────────────────────────────────────────────
function buildLifeBar(contractType, projectId) {
  var ld = LIFE_DATA[projectId];
  if (!ld || !ld[contractType]) return '';
  var d = ld[contractType];
  var today = new Date();

  var startDate = d.commencement;
  var endDate   = d.end_date;
  if (!startDate || !endDate) return '';

  var totalSpan = endDate - startDate;
  var elapsed   = today - startDate;
  var pct = Math.min(100, Math.max(0, elapsed / totalSpan * 100));

  var daysLeft = Math.round((endDate - today) / 86400000);
  var isExpired = daysLeft < 0;
  var isWarranty = d.status === 'warranty';

  var barColor  = isExpired ? '#ef4444' : isWarranty ? '#f59e0b' : 'var(--accent)';

  // Format remaining time as "X anos, Y meses e Z dias"
  function fmtRemaining(days) {
    var abs = Math.abs(days);
    var anos = Math.floor(abs / 365);
    var meses = Math.floor((abs % 365) / 30);
    var dias = abs % 30;
    var parts = [];
    if (anos > 0)  parts.push(anos  + (anos  === 1 ? ' ano'  : ' anos'));
    if (meses > 0) parts.push(meses + (meses === 1 ? ' mês'  : ' meses'));
    if (dias > 0 || parts.length === 0) parts.push(dias + (dias === 1 ? ' dia' : ' dias'));
    return parts.join(', ');
  }

  var remaining = fmtRemaining(daysLeft);
  var statusTxt = isExpired
    ? '<span class="tl-expired">Expirado há ' + fmtRemaining(daysLeft) + '</span>'
    : isWarranty
      ? '<span class="tl-warranty">Em garantia · ' + remaining + ' restantes</span>'
      : '<span class="tl-active">Ativo · ' + remaining + ' restantes</span>';

  // ── SVG timeline ──────────────────────────────────────────────────────
  var milestones = d.milestones || [];
  var W = 600, RAIL_Y = 28, RAIL_H = 8, SVG_H = 90;
  var PAD_L = 12, PAD_R = 12, RAIL_W = W - PAD_L - PAD_R;

  function xPos(date) {
    return PAD_L + Math.min(1, Math.max(0, (date - startDate) / totalSpan)) * RAIL_W;
  }

  var todayX = xPos(today);

  var svg = '<svg viewBox="0 0 '+W+' '+SVG_H+'" xmlns="http://www.w3.org/2000/svg" '
    + 'style="width:100%;height:'+SVG_H+'px;display:block;overflow:visible">';

  // Rail background
  svg += '<rect x="'+PAD_L+'" y="'+RAIL_Y+'" width="'+RAIL_W+'" height="'+RAIL_H+'" rx="4" fill="var(--surface3)"/>';

  // Progress fill
  var fillW = Math.max(0, todayX - PAD_L);
  svg += '<rect x="'+PAD_L+'" y="'+RAIL_Y+'" width="'+fillW+'" height="'+RAIL_H+'" rx="4" fill="'+barColor+'"/>';

  // Today marker
  if (!isExpired && pct > 0 && pct < 100) {
    svg += '<line x1="'+todayX+'" y1="'+(RAIL_Y-4)+'" x2="'+todayX+'" y2="'+(RAIL_Y+RAIL_H+4)+'" stroke="'+barColor+'" stroke-width="2"/>';
    svg += '<text x="'+todayX+'" y="'+(RAIL_Y-8)+'" text-anchor="middle" font-size="8" font-family="Montserrat,sans-serif" font-weight="700" fill="'+barColor+'">HOJE</text>';
  }

  // Milestone markers — odd above rail, even below
  for (var i = 0; i < milestones.length; i++) {
    var m = milestones[i];
    var mx = xPos(m.date);
    var isPast = m.date <= today;
    var dotFill  = isPast ? barColor : 'var(--surface3)';
    var dotStroke = isPast ? barColor : 'var(--border2)';
    var txtFill  = isPast ? 'var(--text1)' : 'var(--text3)';
    var isAbove  = (i % 2 === 0);
    var lineY1, lineY2, txtY, anchor;

    // Dot on rail
    svg += '<circle cx="'+mx+'" cy="'+(RAIL_Y+RAIL_H/2)+'" r="5" fill="'+dotFill+'" stroke="'+dotStroke+'" stroke-width="1.5"/>';

    if (isAbove) {
      // Tick up, label above
      lineY1 = RAIL_Y - 2; lineY2 = RAIL_Y - 14; txtY = lineY2 - 4;
    } else {
      // Tick down, label below
      lineY1 = RAIL_Y + RAIL_H + 2; lineY2 = RAIL_Y + RAIL_H + 14; txtY = lineY2 + 10;
    }
    svg += '<line x1="'+mx+'" y1="'+lineY1+'" x2="'+mx+'" y2="'+lineY2+'" stroke="'+dotStroke+'" stroke-width="1" stroke-dasharray="2,2"/>';

    // Clamp label anchor near edges
    anchor = mx < 60 ? 'start' : mx > (W-60) ? 'end' : 'middle';
    var lx = mx < 60 ? PAD_L : mx > (W-60) ? (W-PAD_R) : mx;
    svg += '<text x="'+lx+'" y="'+txtY+'" text-anchor="'+anchor+'" font-size="9" font-family="Montserrat,sans-serif" font-weight="600" fill="'+txtFill+'">'+m.label+'</text>';

    // Date below label
    var dateStr = m.date.toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
    var dtY = isAbove ? txtY - 10 : txtY + 10;
    svg += '<text x="'+lx+'" y="'+dtY+'" text-anchor="'+anchor+'" font-size="8" font-family="Montserrat,sans-serif" fill="var(--text3)">'+dateStr+'</text>';
  }

  svg += '</svg>';

  return '<div class="tl-wrap">'
    + '<div class="tl-header">'
    +   '<span class="tl-title">Timeline do Contrato</span>'
    +   statusTxt
    + '</div>'
    + svg
    + '</div>';
}

    for (var j = 0; j < p.spes.length; j++) seen[p.spes[j].num] = true;

    for (var j = 0; j < p.contracts.length; j++) if (!p.contracts[j].isEmpty) totalContracts++;
  }
  var kpisHtml = '';
  var kpis = [
    {label:'Projetos', value:PORTFOLIO.length, sub:'carteira Atlas Renewable Energy'},

      else { for (var fi = 0; fi < p.contracts.length; fi++) { var bc = p.contracts[fi].type;

    var alertBadge = '';

    else if (alertInfo && alertInfo.urgency === 'warn')

    // contract type pills
    var typeSeen = {}, typeRows = '';

function getProjectAlertLevel(p) {
  var today = new Date();
  var ld = LIFE_DATA[p.id];
  if (!ld) return null;
  var worstDays = null, worstUrg = null;
  var keys = Object.keys(ld);
  for (var k = 0; k < keys.length; k++) {
    var d = ld[keys[k]];
    if (!d.end_date) continue;
    var days = Math.round((d.end_date - today) / 86400000);
    if (days < 0) continue;
    if (worstDays === null || days < worstDays) {
      worstDays = days;
      worstUrg = days < 365 ? 'crit' : days < 730 ? 'warn' : null;
    }
  }
  return { urgency: worstUrg, days: worstDays };
}

      insHtml += '<div class="item-card r-'+ins.risk+'"><div class="ic-title">'+ins.title+' '+rb(ins.risk)+'</div><div class="ic-desc">'+ins.desc+'</div></div>';
    }
    insHtml += '</div>';
  } else insHtml = '<div class="empty">Nenhum seguro registrado.</div>';

  var fin = c.financials || {};
  var finRows = '';
  var finFields = [['Total Contract Value',fin.total_contract_value],['Readjustment',fin.readjustment],['Payment Conditions',fin.payment_conditions],['Withholding Rights',fin.withholding_rights],['Limit of Liability',fin.limit_of_liability],['SLAs / Delays',fin.slas_delays],['Performance LDs',fin.performance_lds],['Termination',fin.termination]];
  for (var i = 0; i < finFields.length; i++)
    if (finFields[i][1]) finRows += '<div class="field-row"><div class="field-key">'+finFields[i][0]+'</div><div class="field-val">'+finFields[i][1]+'</div></div>';

  var pricesHtml = '<div class="empty">Sem tabela de preços.</div>';
  if (c.prices && c.prices.length) {
    var rows = '', lastSec = '';
    for (var i = 0; i < c.prices.length; i++) {
      var pr = c.prices[i];
      if (pr.section !== lastSec) { rows += '<tr class="sec-row"><td colspan="2">'+pr.section+'</td></tr>'; lastSec = pr.section; }
      rows += '<tr><td>'+pr.item+'</td><td>'+pr.value+'</td></tr>';
    }
    pricesHtml = '<table class="prices-table"><thead><tr><th>Item</th><th>Valor</th></tr></thead><tbody>'+rows+'</tbody></table>';
    if (c.spe_prices && c.spe_prices.length) {
      var spRows = '';
      for (var i = 0; i < c.spe_prices.length; i++) {
        var sp = c.spe_prices[i];
        var d1 = (sp.annual_fee||'').indexOf('confirmar')>=0?' class="diff"':'';
        var d2 = (sp.monthly_fee||'').indexOf('confirmar')>=0?' class="diff"':'';
        spRows += '<tr><td>'+sp.spe+'</td><td'+d1+'>'+sp.annual_fee+'</td><td'+d2+'>'+sp.monthly_fee+'</td></tr>';
      }
      pricesHtml += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);padding:16px 0 8px">Fixed Fee por SPE</div>'
        +'<table class="spe-prices-table"><thead><tr><th>SPE</th><th>Annual Fee</th><th>Monthly Fee</th></tr></thead><tbody>'+spRows+'</tbody></table>';
    }
  }

  var uid = c.id + '_panel';
  return '<div class="contract-panel active" id="panel-'+uid+'">'
    +propostaBanner
    +buildLifeBar(c.type, projectId)
    +hlHtml
    +sumCards
    +'<div class="tabs">'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p1\',this,\''+uid+'\')">Key Personnel</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p2\',this,\''+uid+'\')">Key Dates</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p3\',this,\''+uid+'\')">Securities</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p4\',this,\''+uid+'\')">Insurance</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p5\',this,\''+uid+'\')">Financials</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p6\',this,\''+uid+'\')">Prices</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p7\',this,\''+uid+'\')">Notices</button>'
    +'<button class="tab-btn" onclick="swTab(\''+uid+'-p8\',this,\''+uid+'\')">Notes</button>'
    +'</div>'
    +'<div class="tab-pane" id="'+uid+'-p1"><p class="personnel-hint">Key Personnel — responsáveis, gestores, representantes e contatos.</p><textarea class="personnel-ta" placeholder="Owner Rep: Augusto Prestes&#10;Contractor PM: Alberto Bednarck">'+(c.notes||'')+'</textarea></div>'
    +'<div class="tab-pane" id="'+uid+'-p2"><div class="dates-grid">'+datesHtml+'</div></div>'
    +'<div class="tab-pane" id="'+uid+'-p3">'+secHtml+'</div>'
    +'<div class="tab-pane" id="'+uid+'-p4">'+insHtml+'</div>'
    +'<div class="tab-pane" id="'+uid+'-p5">'+finRows+'</div>'
    +'<div class="tab-pane" id="'+uid+'-p6">'+pricesHtml+'</div>'
    +'<div class="tab-pane" id="'+uid+'-p7">'+buildNoticesHtml(c)+'</div>'
    +'<div class="tab-pane" id="'+uid+'-p8"><div class="field-row"><div class="field-key">Notas</div><div class="field-val">'+(c.notes||'—')+'</div></div></div>'
    +'</div>';
}

function swTab(paneId, btn, uid) {
  var panes = document.querySelectorAll('#panel-'+uid+' .tab-pane');
  for (var i = 0; i < panes.length; i++) panes[i].classList.remove('active');
  var btns = document.querySelectorAll('#panel-'+uid+' .tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var pane = document.getElementById(paneId);
  if (pane) pane.classList.add('active');
  btn.classList.add('active');
}

function activateFirstTab(uid) {
  var panel = document.getElementById('panel-'+uid);
  if (!panel) return;
  var fb = panel.querySelector('.tab-btn');
  if (fb) { fb.classList.add('active'); var m = fb.getAttribute('onclick').match(/'([^']+)'/); if (m) { var pane = document.getElementById(m[1]); if (pane) pane.classList.add('active'); } }
}

function buildNoticesHtml(c) {
  var notices = c.notices || [];
  var typeColor = {NTP:'var(--accent)','Additional Service':'#a78bfa',Default:'#ef4444',Amendment:'var(--accent-warn)',General:'var(--text2)'};
  var statusColor = {Submitted:'var(--accent-mid)',Acknowledged:'#38bdf8',Overdue:'#ef4444',Draft:'var(--text3)'};
  var rows = '';
  for (var i = 0; i < notices.length; i++) {
    var n = notices[i];
    var tc = typeColor[n.type]||typeColor.General;
    var sc = statusColor[n.status]||statusColor.Draft;
    rows += '<div class="notice-card">'
      +'<div class="notice-top">'
      +'<div><div class="notice-id">'+n.id+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--text1)">'+n.subject+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><div style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:rgba(29,158,117,.15);color:'+sc+'">'+(n.status||'Draft')+'</div>'
      +'<div style="font-size:10px;color:var(--text3);margin-top:2px">'+(n.date||'')+'</div></div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;margin-bottom:6px"><span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.06);color:'+tc+'">'+(n.type||'General')+'</span>'
      +'<span style="font-size:9px;color:var(--text3)">Enviado por: '+(n.sentBy||'—')+'</span></div>'
      +(n.desc?'<div style="font-size:11px;color:var(--text2);line-height:1.6">'+n.desc+'</div>':'')
      +'</div>';
  }
  if (!rows) rows = '<div class="empty">Nenhuma notificação registrada.</div>';
  return rows + buildNoticeForm(c);
}

function buildNoticeForm(c) {
  return '<div style="background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;margin-top:12px">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px">Registrar Nova Notificação</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">'
    +'<input id="ni-id-'+c.id+'" placeholder="ID (ex: DRC-NTP-002)" style="padding:8px 10px;width:100%;font-size:11px">'
    +'<input id="ni-date-'+c.id+'" placeholder="Data (ex: 15/06/2026)" style="padding:8px 10px;width:100%;font-size:11px">'
    +'</div>'
    +'<input id="ni-subj-'+c.id+'" placeholder="Assunto" style="padding:8px 10px;width:100%;font-size:11px;margin-bottom:10px">'
    +'<select id="ni-type-'+c.id+'" style="padding:8px 10px;width:100%;font-size:11px;margin-bottom:10px">'
    +'<option value="General">General</option><option value="NTP">NTP</option>'
    +'<option value="Additional Service">Additional Service</option><option value="Amendment">Amendment</option><option value="Default">Default</option>'
    +'</select>'
    +'<textarea id="ni-desc-'+c.id+'" placeholder="Descrição..." style="padding:8px 10px;width:100%;font-size:11px;resize:vertical;min-height:70px;margin-bottom:10px"></textarea>'
    +'<button onclick="addNotice(this)" data-cid="'+c.id+'" style="background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Adicionar</button>'
    +'</div>';
}

function addNotice(btn) {
  var contractId = btn.getAttribute('data-cid');
  var p = currentProject;
  if (!p) return;
  var contract = null;
  for (var j = 0; j < p.contracts.length; j++) if (p.contracts[j].id === contractId) { contract = p.contracts[j]; break; }
  if (!contract) return;
  var id   = document.getElementById('ni-id-'+contractId).value.trim();
  var date = document.getElementById('ni-date-'+contractId).value.trim();
  var subj = document.getElementById('ni-subj-'+contractId).value.trim();
  var type = document.getElementById('ni-type-'+contractId).value;
  var desc = document.getElementById('ni-desc-'+contractId).value.trim();
  if (!subj) { alert('Preencha o assunto.'); return; }
  if (!contract.notices) contract.notices = [];
  contract.notices.push({id:id||('NOT-'+Date.now()),subject:subj,type:type,sentBy:'Owner',date:date,status:'Draft',desc:desc});
  renderProjectPage();
  // re-open Notices tab
  setTimeout(function() {
    var uid = contract.id + '_panel';
    var btns = document.querySelectorAll('#panel-'+uid+' .tab-btn');
    for (var b = 0; b < btns.length; b++) {
      if (btns[b].textContent.trim() === 'Notices') { swTab(uid+'-p7', btns[b], uid); break; }
    }
  }, 50);
}



function renderPerformanceView(p) {
  var perf      = p.performance || {};
  var months    = perf.months   || {};
  var ALL_MONTHS = ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06',
                    '2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  var tgt_topr  = perf.target_topr || null;
  var tgt_avail = perf.target_availability || null;

  // ── Latest month KPI strip ────────────────────────────────────────────
  var latestKey = null;
  for (var i = ALL_MONTHS.length-1; i >= 0; i--) {
    if (months[ALL_MONTHS[i]]) { latestKey = ALL_MONTHS[i]; break; }
  }
  var lat = latestKey ? months[latestKey] : null;

  function kpiCard(label, val, target, suffix, decimals) {
    suffix = suffix || '';
    decimals = decimals != null ? decimals : 2;
    var hasVal = val != null && val !== '';
    var ok = (hasVal && target != null) ? val >= target : null;
    var color = ok === null ? 'var(--text2)' : ok ? 'var(--accent-mid)' : '#ef4444';
    var valStr = hasVal ? val.toFixed(decimals) + suffix : '—';
    return '<div class="perf-kpi-card">'
      + '<div class="perf-kpi-label">'+label+'</div>'
      + '<div class="perf-kpi-val" style="color:'+color+'">'+valStr+'</div>'
      + (target != null ? '<div class="perf-kpi-sub">Target: '+target.toFixed(decimals)+suffix+'</div>' : '<div class="perf-kpi-sub">'+(lat?lat.label:'—')+'</div>')
      + '</div>';
  }

  var kpiHtml = lat
    ? '<div class="perf-kpi-row">'
      + kpiCard('TOPR', lat.topr, tgt_topr, '%')
      + kpiCard('Net Energy', lat.net_energy_mwh ? lat.net_energy_mwh/1000 : null, null, ' GWh', 1)
      + '</div>'
    : '';

  // ── Month table ───────────────────────────────────────────────────────
  var filledKeys = ALL_MONTHS.filter(function(k){ return !!months[k]; });

  var tableHtml = '';
  if (filledKeys.length > 0) {
    // Headers
    var hdrs = '<th></th>';
    for (var i = 0; i < filledKeys.length; i++) hdrs += '<th>'+months[filledKeys[i]].label+'</th>';

    function metricRow(label, key, suffix, decimals, target) {
      suffix = suffix || ''; decimals = decimals != null ? decimals : 2;
      var row = '<tr><td class="pmt-label">'+label+'</td>';
      for (var i = 0; i < filledKeys.length; i++) {
        var mo = months[filledKeys[i]];
        var v = mo[key];
        var hasV = v != null && v !== '';
        var ok = (hasV && target != null) ? v >= target : null;
        var color = ok === null ? '' : ok ? 'color:var(--accent-mid)' : 'color:#ef4444';
        var valStr = hasV ? v.toLocaleString('pt-BR',{minimumFractionDigits:decimals,maximumFractionDigits:decimals})+suffix : '—';
        row += '<td class="pmt-val" style="'+color+'">'+valStr+'</td>';
      }
      return row + '</tr>';
    }

    tableHtml = '<div class="pmt-wrap">'

      // ── Net Energy ──
      + '<div class="pmt-section">'
      + '<div class="pmt-section-title">Net Energy</div>'
      + '<div class="pmt-scroll"><table class="pmt-table">'
      + '<thead><tr>' + hdrs + '</tr></thead><tbody>'
      + '<tr class="pmt-sub-label"><td class="pmt-sub-cell" colspan="' + (filledKeys.length+1) + '">Mensal (MWh)</td></tr>'
      + metricRow('', 'net_energy_mwh', '', 0)
      + '<tr class="pmt-sub-label"><td class="pmt-sub-cell" colspan="' + (filledKeys.length+1) + '">Acumulado YTD (GWh)</td></tr>'
      + metricRow('', 'net_energy_ytd_gwh', ' GWh', 1)
      + '</tbody></table></div></div>'

      // ── TOPR ──
      + '<div class="pmt-section">'
      + '<div class="pmt-section-title">TOPR</div>'
      + '<div class="pmt-scroll"><table class="pmt-table">'
      + '<thead><tr>' + hdrs + '</tr></thead><tbody>'
      + '<tr class="pmt-sub-label"><td class="pmt-sub-cell" colspan="' + (filledKeys.length+1) + '">Mensal (%)</td></tr>'
      + metricRow('', 'topr', '%', 2, tgt_topr)
      + '<tr class="pmt-sub-label"><td class="pmt-sub-cell" colspan="' + (filledKeys.length+1) + '">Acumulado YTD (%)</td></tr>'
      + metricRow('', 'topr_ytd', '%', 2, tgt_topr)
      + '<tr class="pmt-sub-label"><td class="pmt-sub-cell" colspan="' + (filledKeys.length+1) + '">Geração Real/Budget YTD (%)</td></tr>'
      + metricRow('', 'gen_vs_budget_ytd', '%', 2)
      + '</tbody></table></div></div>'

      + '</div>';
  } else {
    tableHtml = '<div class="perf-upload-hint"><div class="perf-upload-icon">📊</div>'
      + '<div class="perf-upload-title">Sem dados de performance</div>'
      + '<div class="perf-upload-sub">Envie os dados mensais para preencher.</div></div>';
  }

  var notesHtml = '<div style="margin-top:20px"><div class="bs-section-title" style="margin-bottom:8px">Notas</div>'
    + '<textarea class="personnel-ta" style="min-height:80px" placeholder="Observações de performance..." onchange="updatePerfNotes(this.value)">'+(perf.notes||'')+'</textarea></div>';

  return '<div style="margin-top:4px">' + kpiHtml + tableHtml + notesHtml + '</div>';
}

function updatePerfNotes(val) {
  if (currentProject) currentProject.performance.notes = val;
}

function addPPA(btn) {
  var pid = btn.getAttribute('data-pid');
  var p = currentProject;
  if (!p) return;
  var company = document.getElementById('ppa-company-'+pid).value.trim();
  var tariff  = parseFloat(document.getElementById('ppa-tariff-'+pid).value.replace(',','.'));
  var start   = document.getElementById('ppa-start-'+pid).value.trim();
  var end     = document.getElementById('ppa-end-'+pid).value.trim();
  var vol     = parseFloat(document.getElementById('ppa-vol-'+pid).value.replace(',','.'));
  if (!company) { alert('Informe a empresa compradora.'); return; }
  if (!p.business) p.business = {ppas:[], opex_items:[]};
  if (!p.business.ppas) p.business.ppas = [];
  p.business.ppas.push({company:company, tariff:isNaN(tariff)?null:tariff, start:start, end:end, volume_mwh:isNaN(vol)?null:vol});
  switchView('business');
}

function exportProject() {
  if (!currentProject) return;
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(currentProject,null,2)],{type:'application/json'}));
  a.download = currentProject.id + '-atlas.json';
  a.click(); URL.revokeObjectURL(a.href);
}


function togglePerfMonth(uid) {
  var item  = document.getElementById(uid);
  var arrow = item.querySelector('.perf-acc-arrow');
  var isOpen = item.classList.toggle('open');
  if (arrow) arrow.textContent = isOpen ? '▾' : '▸';
}



function renderBusinessView(p) {
  var biz = p.business || {};
  var ppas = biz.ppas || [];
  var opex = biz.opex_items || [];
  var pl = p.plant || {};

  // KPI/Commercial strip from plant data
  var kpiStripHtml = '';
  if (pl.ppa_offtaker || pl.kpi_pr_garantido || pl.kpi_disponibilidade || pl.financiador) {
    kpiStripHtml = '<div class="bv-kpi-strip">';
    if (pl.ppa_offtaker) kpiStripHtml += '<div class="bv-kpi-pill"><span class="bv-kpi-label">Off-taker</span><span class="bv-kpi-val">'+pl.ppa_offtaker+'</span></div>';
    if (pl.ppa_preco_usd) kpiStripHtml += '<div class="bv-kpi-pill"><span class="bv-kpi-label">PPA</span><span class="bv-kpi-val">USD '+pl.ppa_preco_usd+'/MWh</span></div>';
    if (pl.kpi_pr_garantido) kpiStripHtml += '<div class="bv-kpi-pill"><span class="bv-kpi-label">PR Garantido</span><span class="bv-kpi-val">'+pl.kpi_pr_garantido+'</span></div>';
    if (pl.kpi_disponibilidade) kpiStripHtml += '<div class="bv-kpi-pill"><span class="bv-kpi-label">Disponibilidade</span><span class="bv-kpi-val">'+pl.kpi_disponibilidade+'</span></div>';
    if (pl.financiador) kpiStripHtml += '<div class="bv-kpi-pill"><span class="bv-kpi-label">Financiador</span><span class="bv-kpi-val">'+pl.financiador+'</span></div>';
    kpiStripHtml += '</div>';
  }

  var totalRevenue = 0;
  for (var i = 0; i < ppas.length; i++)
    if (ppas[i].tariff && ppas[i].volume_mwh) totalRevenue += ppas[i].tariff * ppas[i].volume_mwh;
  var totalOpex = 0;
  for (var i = 0; i < opex.length; i++) if (opex[i].value) totalOpex += opex[i].value;
  var margin    = (totalRevenue || totalOpex) ? totalRevenue - totalOpex : null;
  var marginPct = (totalRevenue > 0 && margin !== null) ? (margin / totalRevenue * 100).toFixed(1) : null;

  // ── SUMMARY ───────────────────────────────────────────────────────────
  function scard(label, value, sub, colorClass) {
    return '<div class="bs-card ' + (colorClass||'') + '">'
      + '<div class="bs-card-label">' + label + '</div>'
      + '<div class="bs-card-value">' + (value || '<span class="bs-empty-val">—</span>') + '</div>'
      + '<div class="bs-card-sub">' + sub + '</div>'
      + '</div>';
  }
  var mClass = margin === null ? '' : margin >= 0 ? 'bs-pos' : 'bs-neg';
  var html = '<div class="bs-wrap">'
    + '<div class="bs-summary">'
    + scard('Revenue (PPAs)', totalRevenue ? fmtBRL(totalRevenue) : null, 'estimado / ano', 'bs-rev')
    + scard('OPEX Total',     totalOpex    ? fmtBRL(totalOpex)    : null, 'estimado / ano', 'bs-opx')
    + scard('Energy Margin',  margin !== null ? fmtBRL(margin) : null, marginPct ? marginPct + '% da receita' : 'Receita − OPEX', mClass)
    + '</div>';

  // ── PPAs ──────────────────────────────────────────────────────────────
  html += '<div class="bs-section"><div class="bs-section-title">PPAs — Contratos de Venda de Energia</div>';

  if (ppas.length === 0) {
    html += '<div class="bs-placeholder">📋 Nenhum PPA registrado. Adicione abaixo.</div>';
  } else {
    for (var i = 0; i < ppas.length; i++) {
      var ppa = ppas[i];
      var rev = (ppa.tariff && ppa.volume_mwh) ? fmtBRL(ppa.tariff * ppa.volume_mwh) + '/ano' : '—';
      html += '<div class="bs-ppa">'
        + '<div class="bs-ppa-name">' + ppa.company + '</div>'
        + '<div class="bs-ppa-row"><span class="bs-ppa-k">Tarifa</span><span class="bs-ppa-v bs-green">R$ ' + ppa.tariff + '/MWh</span></div>'
        + '<div class="bs-ppa-row"><span class="bs-ppa-k">Volume</span><span class="bs-ppa-v">' + (ppa.volume_mwh||'—') + ' MWh/ano</span></div>'
        + '<div class="bs-ppa-row"><span class="bs-ppa-k">Vigência</span><span class="bs-ppa-v">' + ppa.start + ' → ' + ppa.end + '</span></div>'
        + '<div class="bs-ppa-row"><span class="bs-ppa-k">Receita est.</span><span class="bs-ppa-v bs-green">' + rev + '</span></div>'
        + '</div>';
    }
  }

  html += '<details class="bs-form">'
    + '<summary class="bs-form-sum">＋ Adicionar PPA</summary>'
    + '<div class="bs-form-body">'
    + '<div class="bs-form-grid">'
    + '<div class="bs-ff"><label>Empresa</label><input id="ppa-company-' + p.id + '" placeholder="ex: CEMIG GT"></div>'
    + '<div class="bs-ff"><label>Tarifa (R$/MWh)</label><input id="ppa-tariff-' + p.id + '" placeholder="ex: 280,00"></div>'
    + '<div class="bs-ff"><label>Início</label><input id="ppa-start-' + p.id + '" placeholder="MM/AAAA"></div>'
    + '<div class="bs-ff"><label>Fim</label><input id="ppa-end-' + p.id + '" placeholder="MM/AAAA"></div>'
    + '<div class="bs-ff bs-ff-wide"><label>Volume (MWh/ano)</label><input id="ppa-vol-' + p.id + '" placeholder="ex: 850.000"></div>'
    + '</div>'
    + '<button class="bs-btn" onclick="addPPA(this)" data-pid="' + p.id + '">Adicionar PPA</button>'
    + '</div></details>'
    + '</div>';

  // ── OPEX ──────────────────────────────────────────────────────────────
  html += '<div class="bs-section"><div class="bs-section-title">Custos de Operação (OPEX)</div>';
  for (var i = 0; i < opex.length; i++) {
    var o = opex[i];
    var hasVal = (o.value !== null && o.value !== undefined);
    var pct = (hasVal && totalOpex > 0) ? Math.round(o.value / totalOpex * 100) : 0;
    html += '<div class="bs-opex-row">'
      + '<div class="bs-opex-info"><span class="bs-opex-name">' + o.label + '</span>'
      + (o.source ? '<span class="bs-opex-src">' + o.source + '</span>' : '') + '</div>'
      + '<div class="bs-opex-bar"><div class="bs-opex-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="bs-opex-val' + (hasVal ? '' : ' bs-na') + '">' + (hasVal ? fmtBRL(o.value) : 'A preencher') + '</div>'
      + '</div>';
  }
  html += '<div class="bs-opex-total">'
    + '<span class="bs-opex-name">Total OPEX</span>'
    + '<span class="bs-opex-val' + (totalOpex ? ' bs-accent' : ' bs-na') + '">' + (totalOpex ? fmtBRL(totalOpex) : '—') + '</span>'
    + '</div>'
    + '</div>';

  // Generation Walk chart
  var walkHtml = renderGenerationWalk(biz);
  if (walkHtml) {
    html += '<div class="bs-section"><div class="bs-section-title">Generation Walk YTD</div>'
      + walkHtml + '</div>';
  }

  html += '</div>';
  return html;
}

function renderGenerationWalk(biz) {
  var walk = biz && biz.generation_walk;
  if (!walk || !walk.steps || walk.steps.length === 0) {
    return '<div class="bs-placeholder" style="margin-top:16px">📊 Dados de Generation Walk não cadastrados.</div>';
  }

  var steps  = walk.steps;
  var unit   = walk.unit   || 'MWh';
  var period = walk.period || 'YTD';
  var N      = steps.length;

  // ── Layout constants ────────────────────────────────────────────────────
  var COL_W    = 36;   // px per column (bar + gap)
  var BAR_W    = 22;   // bar width
  var H_CHART  = 180;  // chart drawing area height
  var PAD_L    = 8;    // left padding
  var LABEL_H  = 68;   // space below baseline for rotated labels
  var SVG_W    = N * COL_W + PAD_L * 2;
  var SVG_H    = H_CHART + LABEL_H;
  var BASELINE = H_CHART; // y position of x-axis

  // ── Find max value for scale ────────────────────────────────────────────
  var maxVal = 0;
  for (var i = 0; i < N; i++) {
    if (steps[i].value > maxVal) maxVal = steps[i].value;
  }
  // Scale: maxVal maps to H_CHART - 30 (leave room for top labels)
  var USABLE = H_CHART - 24;
  function toY(v) { return USABLE - Math.round(v / maxVal * USABLE); }

  // ── Running waterfall level ─────────────────────────────────────────────
  // Track current "floor" in value units
  var runningVal = 0; // the current cumulative top
  // For each step compute: barTop (y), barBottom (y), color
  var bars = [];
  for (var i = 0; i < N; i++) {
    var s = steps[i];
    var isSubtotal = (s.type === 'subtotal' || s.type === 'final' || s.type === 'base');

    if (isSubtotal || s.type === 'base') {
      // Full bar from baseline up to s.value
      var yTop    = BASELINE - Math.round(s.value / maxVal * USABLE);
      var yBottom = BASELINE;
      var col     = '#888888';
      runningVal  = s.value; // reset running level to this subtotal
      bars.push({ yTop: yTop, yBottom: yBottom, col: col, s: s, isSubtotal: true });
    } else {
      // Loss: floats — top = current running level, hangs down by |s.value|
      var topY    = BASELINE - Math.round(runningVal / maxVal * USABLE);
      var dropPx  = Math.round(Math.abs(s.value) / maxVal * USABLE);
      if (dropPx < 2 && Math.abs(s.value) > 0) dropPx = 2;
      var bottomY = topY + dropPx;
      // Color: big loss = red, small = dark grey
      var colLoss = Math.abs(s.value) >= 10 ? '#cc2222' : '#555555';
      runningVal  = runningVal + s.value; // update running (s.value is negative)
      bars.push({ yTop: topY, yBottom: bottomY, col: colLoss, s: s, isSubtotal: false });
    }
  }

  // ── Build SVG ───────────────────────────────────────────────────────────
  var svg = [];
  svg.push('<svg xmlns="http://www.w3.org/2000/svg"'
    + ' width="' + SVG_W + '" height="' + SVG_H + '"'
    + ' style="display:block;background:#000000;min-width:' + SVG_W + 'px">');

  // Baseline
  svg.push('<line x1="0" y1="' + BASELINE + '" x2="' + SVG_W + '" y2="' + BASELINE
    + '" stroke="#ffffff" stroke-width="1" opacity="0.5"/>');

  for (var i = 0; i < N; i++) {
    var b  = bars[i];
    var s  = b.s;
    var bx = PAD_L + i * COL_W + (COL_W - BAR_W) / 2;
    var cx = bx + BAR_W / 2;
    var barH = b.yBottom - b.yTop;
    if (barH < 1) barH = 1;

    // Bar
    svg.push('<rect x="' + bx + '" y="' + b.yTop
      + '" width="' + BAR_W + '" height="' + barH
      + '" fill="' + b.col + '" rx="1"/>');

    // Value label
    var valStr = s.value === 0 ? '0' : s.value.toFixed(3).replace('-', '\u2212');
    var textColor = '#ffffff';

    var lblY;
    if (!b.isSubtotal) {
      // Loss: label above the floating bar (above yTop)
      lblY = b.yTop - 4;
    } else {
      // Subtotal: label above bar top
      lblY = b.yTop - 4;
    }
    // If label would go off-screen (above SVG), push down
    if (lblY < 10) lblY = b.yBottom + 12;

    svg.push('<text x="' + cx + '" y="' + lblY
      + '" text-anchor="middle"'
      + ' fill="' + textColor + '"'
      + ' font-size="9" font-family="Montserrat,Arial,sans-serif" font-weight="600">'
      + valStr + '</text>');

    // X-axis label (rotated +90 from baseline, reading bottom-up like the photo)
    var lx = cx;
    var ly = BASELINE + 6;
    svg.push('<text'
      + ' transform="translate(' + lx + ',' + ly + ') rotate(90)"'
      + ' text-anchor="start" dominant-baseline="middle"'
      + ' fill="#bbbbbb"'
      + ' font-size="9" font-family="Montserrat,Arial,sans-serif" font-weight="500">'
      + s.label + '</text>');
  }

  svg.push('</svg>');

  return '<div class="gw-wrap">'
    + '<div class="gw-header">'
    +   '<div class="gw-title">Generation Walk <span class="gw-period">' + period + '</span></div>'
    +   '<div class="gw-unit">' + unit + '</div>'
    + '</div>'
    + '<div class="gw-chart-scroll"><div class="gw-chart-center">' + svg.join('') + '</div></div>'
    + '<div class="gw-legend">'
    +   '<span class="gw-leg-item"><span class="gw-leg-dot" style="background:#888888"></span>Base / Subtotal</span>'
    +   '<span class="gw-leg-item"><span class="gw-leg-dot" style="background:#cc2222"></span>Perdas significativas</span>'
    +   '<span class="gw-leg-item"><span class="gw-leg-dot" style="background:#555555"></span>Perdas menores</span>'
    + '</div>'
    + '</div>';
}

// ── THEME ─────────────────────────────────────────────────────────────────
function applyStoredTheme() {
  var saved = localStorage.getItem('atlas-theme');
  if (saved === 'light') document.body.classList.add('light-mode');
  else document.body.classList.remove('light-mode');
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = saved === 'light' ? '☾' : '☼';
}

function toggleTheme() {
  var isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('atlas-theme', isLight ? 'light' : 'dark');
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = isLight ? '☾' : '☼';
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyStoredTheme();
  goToDashboard();
});
